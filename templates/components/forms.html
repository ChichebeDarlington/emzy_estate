<form
  method="GET"
  action=""
  class="p-5 text-white"
  style="
    background-image: url(/static/images/estate_hero.jpg);
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
  "
>
  {% csrf_token %}
  <section class="" style="max-width: 700px; margin: 0 auto">
    <div class="mb-3">
      <label for="pwd" class="form-label">Search</label>
      <input
        type="text"
        value="{{request.GET.search}}"
        class="form-control text-danger"
        id="search"
        placeholder="Search your prefered Estates"
        name="search"
      />
    </div>
    <section class="row">
      <div class="col-6 mb-3">
        <label for="">Type</label>
        <select class="form-select" name="apartment">
          <option value="">All Types</option>
          <option value="flat">Flat</option>
          <option value="self contain">Self Contains</option>
          <option value="single room">Single Room</option>
        </select>
      </div>

      <div class="col-6">
        <label for="">Apartment</label>
        <select class="form-select" name="apartment">
          <option va="">Any</option>
          <option value="1">1</option>
          <option value="2">2</option>
          <option value="3">3</option>
          <option value="4">4</option>
          <option value="5">5</option>
        </select>
      </div>

      <div class="col-6 mb-3">
        <label for="">Min Price</label>
        <select class="form-select" name="min_price">
          <option value="">All</option>
          <option value="150000">N150,000</option>
          <option value="200000">N200,000</option>
          <option value="250000">N250,000</option>
          <option value="300000">300,000</option>
        </select>
      </div>

      <div class="col-6">
        <label for="">Max Price</label>
        <select class="form-select" name="max_price">
          <option value="">All</option>
          <option value="250000">N250,000</option>
          <option value="500000">N500,000</option>
          <option value="1000000">N1 Million</option>
          <option value="2000000">2 Million</option>
        </select>
      </div>
    </section>

    <div class="d-grid">
      <p class="text-center cursor-pointer" role="button">show more options</p>
      <button type="submit" class="btn btn-danger btn-block p-3">Search</button>
    </div>
  </section>
</form>
